name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  compose-smoke:
    name: compose up + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build -d --wait
      - name: smoke-check both services through the consumer
        run: |
          curl -sf http://localhost:3001/health
          curl -sf http://localhost:3000/health
          curl -sf http://localhost:3000/accounts/acc-001/overview | tee overview.json
          grep -q '"recentTransactions"' overview.json
      - if: always()
        run: docker compose down

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit, not just the checkout.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
