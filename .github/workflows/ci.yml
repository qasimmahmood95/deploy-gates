name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  compose-smoke:
    name: compose up + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build -d --wait
      - name: smoke-check both services through the consumer
        run: |
          curl -sf http://localhost:3001/health
          curl -sf http://localhost:3000/health
          curl -sf http://localhost:3000/accounts/acc-001/overview | tee overview.json
          grep -q '"recentTransactions"' overview.json
      - name: dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down

  compatibility-gate:
    name: compatibility gate (pact)
    runs-on: ubuntu-latest
    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: pact
      PACT_BROKER_PASSWORD: pact
      GIT_COMMIT_SHA: ${{ github.sha }}
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: start pact broker
        run: docker compose --profile pact up -d pact-broker
      - name: wait for broker heartbeat
        run: |
          for i in $(seq 1 30); do
            if curl -sf -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
              http://localhost:9292/diagnostic/status/heartbeat; then
              echo; echo "broker is up"; exit 0
            fi
            sleep 2
          done
          echo "broker did not become ready" >&2
          docker compose --profile pact logs pact-broker pact-broker-db
          exit 1
      - name: consumer contract test (generate pact)
        run: npm run test:pact
      - name: publish contract to broker
        run: npm run pact:publish
      - name: provider verification (publishes results to broker)
        run: npm run pact:verify
      - name: can-i-deploy (the gate)
        run: npm run pact:can-i-deploy
      - name: dump broker logs on failure
        if: failure()
        run: docker compose --profile pact logs --no-color pact-broker pact-broker-db
      - if: always()
        run: docker compose --profile pact down

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit, not just the checkout.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
