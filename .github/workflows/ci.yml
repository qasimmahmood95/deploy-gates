name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  compose-smoke:
    name: compose up + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build -d --wait
      - name: smoke-check both services through the consumer
        run: |
          curl -sf http://localhost:3001/health
          curl -sf http://localhost:3000/health
          curl -sf http://localhost:3000/accounts/acc-001/overview | tee overview.json
          grep -q '"recentTransactions"' overview.json
      - name: dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down

  compatibility-gate:
    name: compatibility gate (pact)
    runs-on: ubuntu-latest
    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: pact
      PACT_BROKER_PASSWORD: pact
      # On pull_request, github.sha is the ephemeral merge commit; record pact
      # versions against the real head commit so broker versions map to a commit
      # that actually gets deployed.
      GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: start pact broker
        run: docker compose --profile pact up -d pact-broker
      - name: wait for broker heartbeat
        run: |
          for i in $(seq 1 30); do
            if curl -sf -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
              http://localhost:9292/diagnostic/status/heartbeat; then
              echo; echo "broker is up"; exit 0
            fi
            sleep 2
          done
          echo "broker did not become ready" >&2
          docker compose --profile pact logs pact-broker pact-broker-db
          exit 1
      - name: consumer contract test (generate pact)
        run: npm run test:pact
      - name: publish contract to broker
        run: npm run pact:publish
      - name: provider verification (publishes results to broker)
        run: npm run pact:verify
      - name: can-i-deploy (the gate)
        run: npm run pact:can-i-deploy
      - name: dump broker logs on failure
        if: failure()
        run: docker compose --profile pact logs --no-color pact-broker pact-broker-db
      - if: always()
        run: docker compose --profile pact down

  performance-gate:
    name: performance gate (k6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: start provider
        run: docker compose up --build -d --wait provider
      - uses: grafana/setup-k6-action@v1
      - name: run k6 steady + spike scenarios (thresholds are the gate)
        run: k6 run k6/load.js
        env:
          BASE_URL: http://localhost:3001
      - name: dump provider logs on failure
        if: failure()
        run: docker compose logs --no-color provider
      - if: always()
        run: docker compose down

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit, not just the checkout.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- The unified deploy gate ------------------------------------------------
  # gate-summary always runs and reports both gate verdicts side by side.
  # deploy only runs when BOTH gates succeed (default `needs` semantics), so a
  # single red gate provably blocks the deploy.
  gate-summary:
    name: gate status summary
    runs-on: ubuntu-latest
    needs: [compatibility-gate, performance-gate]
    if: always()
    steps:
      - name: write gate status to the job summary
        run: |
          compat='${{ needs.compatibility-gate.result }}'
          perf='${{ needs.performance-gate.result }}'
          verdict() { if [ "$1" = success ]; then echo '✅ pass'; else echo "❌ $1"; fi; }
          {
            echo '## Deploy gates'
            echo
            echo '| Gate | Verdict |'
            echo '| --- | --- |'
            echo "| Compatibility (Pact) | $(verdict "$compat") |"
            echo "| Performance (k6) | $(verdict "$perf") |"
            echo
            if [ "$compat" = success ] && [ "$perf" = success ]; then
              echo '**Deploy allowed** — both gates are green.'
            else
              echo '**Deploy blocked** — at least one gate is not green.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: deploy (gated on both gates)
    runs-on: ubuntu-latest
    # The two release gates are the headline dependency, but a real deploy also
    # needs the rest of the board green — so a failing test or a leaked secret
    # blocks it too. deploy runs on every green build (PRs included) on purpose,
    # so a red gate visibly skips it here; a real pipeline would additionally
    # guard this to `main` (see README).
    needs: [checks, compose-smoke, compatibility-gate, performance-gate, secret-scan]
    steps:
      - name: deploy (fake)
        run: |
          echo "All gates green — deploy authorized for ${GITHUB_SHA}."
          mkdir -p artifact
          echo "deploy authorized for ${GITHUB_SHA}" > artifact/deploy.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-marker
          path: artifact/deploy.txt
      - name: record the deploy in the job summary
        run: echo "## Deploy authorized for \`${GITHUB_SHA}\` — all gates green." >> "$GITHUB_STEP_SUMMARY"
