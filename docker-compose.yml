services:
  provider:
    build:
      context: .
      dockerfile: services/provider/Dockerfile
    ports:
      - '3001:3001'
    healthcheck:
      # Use node (guaranteed present in a node image) rather than depending on a
      # wget/curl binary that may not ship in node:22-alpine.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- Pact compatibility gate -------------------------------------------------
  # Broker + its database live behind the `pact` profile so the default
  # `docker compose up` (the M1 service smoke) does not start them. The pact gate
  # brings them up explicitly with `docker compose --profile pact up`.
  #
  # All credentials below are local/CI-only defaults for a throwaway broker.
  # They are NOT secrets; docker-compose.yml is allowlisted in .gitleaks.toml
  # for exactly this reason and must never carry a real credential.
  pact-broker-db:
    image: postgres:16.14-alpine
    profiles: ['pact']
    environment:
      POSTGRES_USER: pact_broker
      POSTGRES_PASSWORD: pact_broker
      POSTGRES_DB: pact_broker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pact_broker -d pact_broker']
      interval: 5s
      timeout: 3s
      retries: 10

  pact-broker:
    # Pinned (not :latest) so the gate's verdict is reproducible across runs.
    image: pactfoundation/pact-broker:2.140.0-pactbroker2.119.0
    profiles: ['pact']
    depends_on:
      pact-broker-db:
        condition: service_healthy
    ports:
      - '9292:9292'
    environment:
      PACT_BROKER_DATABASE_URL: postgres://pact_broker:pact_broker@pact-broker-db/pact_broker
      PACT_BROKER_BASIC_AUTH_USERNAME: pact
      PACT_BROKER_BASIC_AUTH_PASSWORD: pact
      # Postgres' entrypoint briefly runs a bootstrap server during init, so
      # pg_isready can report ready before the real server is up. Give the broker
      # generous connect retries to ride out that window during migration.
      PACT_BROKER_DATABASE_CONNECT_MAX_RETRIES: '20'

  consumer:
    build:
      context: .
      dockerfile: services/consumer/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PROVIDER_BASE_URL: http://provider:3001
    depends_on:
      provider:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
